# CloudForge Lab Specification
# Run with: cloudforge run examples/lab.yaml

name: my-test-lab
provider: aws          # aws | gcp | azure
region: us-east-1
instance_type: t2.micro
storage_gb: 10
tags:
  project: cloudforge
  env: test
tests:
  - connectivity
  - api
  - performance
teardown_on_success: true
teardown_on_failure: false
